<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気まぐれメニュー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f5f0e8;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8b99a' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-family: 'Noto Serif JP', serif;
        }
        .card {
            background: #fffdf8;
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            text-align: center;
        }
        .card::before {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 20px; background: rgba(200, 175, 130, 0.4); border-radius: 2px;
        }
        .header-tag { font-size: 0.6rem; letter-spacing: 3px; color: #a08c6e; margin-bottom: 8px; text-transform: uppercase; }
        
        .header h1 {
            font-size: 7.5vw;
            max-font-size: 1.8rem;
            font-weight: 700;
            color: #3a2e22;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            margin: 0 auto;
        }
        @media (min-width: 400px) { .header h1 { font-size: 1.8rem; } }

        .header-sub { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.8rem; color: #b09070; margin-top: 5px; }
        .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .divider-line { flex: 1; height: 1px; background: #d9cfc0; }
        .category { margin-bottom: 20px; }
        .category-title { font-size: 0.6rem; letter-spacing: 4px; color: #a08c6e; margin-bottom: 15px; }
        .item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e0d8cc; text-align: left; }
        .item:last-child { border-bottom: none; }
        .item-name { font-size: 1rem; color: #3a2e22; font-weight: 700; margin-bottom: 4px; }
        .item-desc { font-size: 0.75rem; color: #a09080; line-height: 1.5; }
        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid #e0d8cc; font-family: 'Playfair Display', serif; font-style: italic; color: #b09070; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-tag">Today's Kitchen</div>
            <h1>気まぐれメニュー</h1>
            <div class="header-sub">Seasonal delights, just for today.</div>
        </div>
        <div class="divider"><div class="divider-line"></div><div style="font-size:0.7rem;color:#b09878;">✿</div><div class="divider-line"></div></div>
        
        <div class="category">
            <div class="category-title">— FOOD —</div>
            <div class="item">
                <div class="item-name">チャーハン</div>
                <div class="item-desc">パラパラの食感と香ばしい醤油の香りが食欲をそそります。</div>
            </div>
            <div class="item">
                <div class="item-name">トマトパスタ</div>
                <div class="item-desc">じっくり煮込んだ自家製トマトソースをたっぷり絡めて。</div>
            </div>
            <div class="item">
                <div class="item-name">オムライス</div>
                <div class="item-desc">ふわふわの卵で包んだ、どこか懐かしい優しい味わい。</div>
            </div>
        </div>

        <div class="category">
            <div class="category-title">— DRINK —</div>
            <div class="item">
                <div class="item-name">水</div>
                <div class="item-desc">清らかな天然水。お食事の合間にリフレッシュを。</div>
            </div>
            <div class="item">
                <div class="item-name">麦茶</div>
                <div class="item-desc">香ばしく焙煎された、心落ち着く定番の味わい。</div>
            </div>
            <div class="item">
                <div class="item-name">紅茶</div>
                <div class="item-desc">華やかな香りが広がる、贅沢なひとときをどうぞ。</div>
            </div>
        </div>

        <div class="footer">Slow food, Good time ☕</div>
    </div>
</body>
</html>
