<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気まぐれメニュー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f5f0e8;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8b99a' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-family: 'Noto Serif JP', serif;
        }
        .card {
            background: #fffdf8;
            width: 100%;
            max-width: 400px;
            height: 85vh; /* 縦の長さを固定してスクロールさせる */
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .card::before {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 20px; background: rgba(200, 175, 130, 0.4); border-radius: 2px;
            z-index: 10;
        }
        
        /* スクロールエリアの設定 */
        .scroll-content {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }
        /* スクロールバーを見えなくする（お洒落重視） */
        .scroll-content::-webkit-scrollbar { width: 0; }
        
        .header { text-align: center; margin-bottom: 10px; }
        .header-tag { font-size: 0.6rem; letter-spacing: 3px; color: #a08c6e; margin-bottom: 8px; text-transform: uppercase; }
        .header h1 {
            font-size: 7.5vw;
            font-weight: 700;
            color: #3a2e22;
            white-space: nowrap;
            line-height: 1.4;
        }
        @media (min-width: 400px) { .header h1 { font-size: 1.8rem; } }
        .header-sub { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.8rem; color: #b09070; margin-top: 5px; }

        .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .divider-line { flex: 1; height: 1px; background: #d9cfc0; }
        
        .category { margin-bottom: 25px; text-align: center; }
        .category-title { font-size: 0.65rem; letter-spacing: 4px; color: #a08c6e; margin-bottom: 15px; font-weight: bold; }
        .item { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #e0d8cc; }
        .item:last-child { border-bottom: none; }
        .item-name { font-size: 0.95rem; color: #3a2e22; font-weight: 700; }

        .footer { 
            margin-top: 15px; 
            padding-top: 10px; 
            border-top: 1px solid #e0d8cc; 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            color: #b09070; 
            font-size: 0.85rem; 
            text-align: center;
            position: relative;
        }
        /* スクロール案内のアイコン */
        .scroll-hint {
            position: absolute;
            right: 0;
            bottom: 0;
            font-size: 0.6rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-tag">Today's Kitchen</div>
            <h1>気まぐれメニュー</h1>
            <div class="header-sub">Simple & Real delights.</div>
        </div>

        <div class="divider"><div class="divider-line"></div><div style="font-size:0.7rem;color:#b09878;">✿</div><div class="divider-line"></div></div>

        <div class="scroll-content">
            <div class="category">
                <div class="category-title">— MAIN FOOD —</div>
                <div class="item"><div class="item-name">油そば</div></div>
                <div class="item"><div class="item-name">チャーハン</div></div>
                <div class="item"><div class="item-name">トマトパスタ</div></div>
                <div class="item"><div class="item-name">トースト</div></div>
                <div class="item"><div class="item-name">卵かけご飯</div></div>
            </div>

            <div class="category">
                <div class="category-title">— SIDE MENU —</div>
                <div class="item"><div class="item-name">納豆</div></div>
                <div class="item"><div class="item-name">冷奴</div></div>
            </div>

            <div class="category">
                <div class="category-title">— DESSERT —</div>
                <div class="item"><div class="item-name">ヨーグルト</div></div>
                <div class="item"><div class="item-name">気まぐれフルーツ</div></div>
            </div>

            <div class="category">
                <div class="category-title">— DRINK —</div>
                <div class="item"><div class="item-name">コーヒー</div></div>
                <div class="item"><div class="item-name">カフェラテ</div></div>
                <div class="item"><div class="item-name">紅茶 (Hot / Ice)</div></div>
                <div class="item"><div class="item-name">麦茶</div></div>
                <div class="item"><div class="item-name">水</div></div>
            </div>
        </div>

        <div class="footer">
            Good food, Good time ☕
            <div class="scroll-hint">Scroll ↓</div>
        </div>
    </div>
</body>
</html>
